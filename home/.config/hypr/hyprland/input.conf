$scripts = ~/.config/dotfiles-scripts/

#bind = SUPER, G, exec, pkill -SIGUSR1 waybar
#bindirt = SUPER, SUPER_L, exec, pkill -SIGUSR1 waybar

bind = SUPER, C, killactive,
bind = SUPER, F, togglefloating,
bind = SUPER, Z, pseudo
bind = SUPER, B, layoutmsg, togglesplit
bind = SUPER, S, fullscreen
bind = SUPER, R, exec, hyprctl reload

# who needs a power menu anyway :3
bind = SUPER_CTRL_ALT, H, exec, hyprshutdown -t "Shutting down..." -p "systemctl poweroff" # HALT
bind = SUPER_CTRL_ALT, R, exec, hyprshutdown -t "Rebooting..." -p "systemctl reboot"       # REBOOT
bind = SUPER_CTRL_ALT, S, exec, systemctl suspend                                          # SUSPEND
bind = SUPER_CTRL_ALT, L, exec, loginctl lock-session                                      # LOCK
bind = SUPER_CTRL_ALT, E, exec, hyprshutdown -t "Exiting Hyprland..."                      # EXIT

bind = SUPER, Tab, cyclenext
bind = SUPER, Tab, bringactivetotop

bind = SUPER, SPACE, exec, rofi -show drun
bind = SUPER, V, exec, bash pgrep -f "^cursor-clip$" || cursor-clip
bind = SUPER_SHIFT, S, exec, pgrep -f "^hyprcrop freeze$" || hyprcrop freeze
bind = SUPER, Q, exec, kitty

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
#
binde = SUPER_SHIFT, left, movewindow, l
binde = SUPER_SHIFT, right, movewindow, r
binde = SUPER_SHIFT, up, movewindow, u
binde = SUPER_SHIFT, down, movewindow, d
#
binde = SUPER_CTRL, left, resizeactive, -50 0
binde = SUPER_CTRL, right, resizeactive, 50 0
binde = SUPER_CTRL, up, resizeactive, 0 -30
binde = SUPER_CTRL, down, resizeactive, 0 30
#
binde = SUPER_SHIFT_ALT, left, moveactive, -50 0
binde = SUPER_SHIFT_ALT, right, moveactive, 50 0
binde = SUPER_SHIFT_ALT, up, moveactive, 0 -50
binde = SUPER_SHIFT_ALT, down, moveactive, 0 50

bind = SUPER, G, togglegroup,
bind = SUPER, h, changegroupactive, b
bind = SUPER, l, changegroupactive, f
bind = SUPER_SHIFT, G, lockactivegroup, toggle

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

bind = SUPER, mouse_down, workspace, e-1
bind = SUPER, mouse_up, workspace, e+1
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, J, workspace, -1
bind = SUPER, K, workspace, +1
bind = SUPER_SHIFT, J, movetoworkspace, -1
bind = SUPER_SHIFT, K, movetoworkspace, +1

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && $scripts/nsosd sink
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && $scripts/nsosd sink
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && $scripts/nsosd sink
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e2.4 -n15 set 5%+ && $scripts/nsosd brightness
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e2.4 -n15 set 5%- && $scripts/nsosd brightness

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause


input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    accel_profile=flat
    force_no_accel=1
    sensitivity=0.000000

    touchpad {
        natural_scroll = true
		scroll_factor = .5
    }
    
    touchdevice {
    	enabled = true
    	output = eDP-1
    	transform = 0
    }

    tablet { # works along with UGEE drivers
        left_handed = true
        active_area_size = 254 158.75
    }
}

gestures {
	workspace_swipe_touch = true
}
gesture = 3, vertical, workspace
