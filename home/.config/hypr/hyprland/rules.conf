windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = onlyoffice-dialog-center
    match:class = DesktopEditors
    match:float = true

    center = true
}

windowrule {
    name = fix-flameshot
    match:class = flameshot
    
    no_anim = true
    float = true
    move = 0 0
}

layerrule {
  name = no-anim-selection
  match:namespace = selection

  no_anim = true
}

layerrule {
    name = rofi-slide
    match:namespace = rofi

    animation = slide
}

windowrule = match:class (pinentry-)(.*), stay_focused true
