layerrule {
  name = no-anim-selection
  match:namespace = selection

  no_anim = true
}

layerrule {
    name = rofi-slide
    match:namespace = rofi

    #animation = slide
    dim_around = true
}

windowrule = match:class (pinentry-)(.*), stay_focused true
