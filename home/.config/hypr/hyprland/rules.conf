windowrule {
    name = nmtui
    match:class = nmtui
    
    float = true
    center = true
    size = 1000 700
    pin = true
    dim_around = true
}

windowrule {
    name = blueman
    match:class = blueman-manager

    float = true
    center = true
    size = 1000 700
    pin = true
    dim_around = true
}

