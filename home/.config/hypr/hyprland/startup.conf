exec-once = hyprctl setcursor macOS 26

exec-once = waybar
exec-once = hyprpaper
exec-once = mako

exec-once = systemctl --user start hyprpolkitagent
exec-once = cursor-clip --daemon
exec-once = hypridle
exec-once = blueman-applet
exec-once = udiskie -s
exec-once = wlsunset -l 25 -L 67
exec-once = gnome-clocks --gapplication-service # alarms

# disable the horribly positioned power button
exec-once = systemd-inhibit --who="Hyprland config" --why="awful location" --what=handle-power-key --mode=block sleep infinity & echo $! > /tmp/.hyprland-systemd-inhibit
exec-shutdown = kill -9 "$(cat /tmp/.hyprland-systemd-inhibit)"
bindr = , XF86PowerOff, exec,
