exec-once = waybar
exec-once = hyprpaper
exec-once = swaync
exec-once = flameshot
#exec-once = elephant
#exec-once = walker --gapplication-service

exec-once = systemctl --user start hyprpolkitagent
exec-once = cursor-clip --daemon
exec-once = swayosd-server
exec-once = hypridle

# map the horribly positioned power button
# on my chromebook to wlogout
exec-once = systemd-inhibit --who="Hyprland config" --why="wlogout keybind" --what=handle-power-key --mode=block sleep infinity & echo $! > /tmp/.hyprland-systemd-inhibit
exec-shutdown = kill -9 "$(cat /tmp/.hyprland-systemd-inhibit)"
# power button issues fix
bindr = , XF86PowerOff, exec, pgrep wlogout || wlogout 
