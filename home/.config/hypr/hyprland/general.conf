general {
    gaps_in = 5
    gaps_out = 10

    border_size = 3
    col.active_border = rgba(C061CBff)
    col.inactive_border = rgba(1f1f1f00)

    resize_on_border = true
    extend_border_grab_area = 15

    allow_tearing = false

    layout = dwindle
    
    snap {
       enabled = true
       respect_gaps = true
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}
