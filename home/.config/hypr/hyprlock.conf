bezier = linear, 1, 1, 0, 0
animation = fade, 1, 1.8, linear

background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 5
    blur_size = 1
    crossfade_time = 1
    brightness = 0.5
}

label {
    monitor =
    text = cmd[update:1000] date +"%l:%M"
    color = rgba(255, 255, 255, 1.0)
    font_size = 100
    font_family = Adwaita Sans Bold

    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = $ATTEMPTS[]
    color = rgba(255, 200, 200, 1.0)
    font_size = 20
    font_family = Adwaita Sans Bold

    position = 0, -100
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 0
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccff00)
    check_color=rgba(00ff9900)
    fail_color=rgba(ff663300)

    font_color = rgb(143, 143, 143)
    fade_on_empty = true
    rounding = 15

    position = 0, 20
    halign = center
    valign = bottom
    font_family = Adwaita Sans
    placeholder_text =
    fail_text = Authentication failure
}
